    <main class="main-content">
        <header class="header-admin">
            <h2 class="text-3xl font-bold text-gray-800">Gestion des Services</h2>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition">
                + Nouveau Service
            </button>
        </header>

        <div id="servicesList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Services will be loaded here -->
        </div>

        <!-- Edit/Add Service Modal -->
        <div id="serviceModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
            <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold" id="modalTitle">Modifier le Service</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <form id="serviceForm" class="space-y-4">
                    <input type="hidden" name="id" id="serviceIdField">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nom du Service</label>
                        <input name="name" id="formName" type="text" required class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Prix (HTG)</label>
                        <input name="price" id="formPrice" type="text" required class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Délai</label>
                        <input name="delay" id="formDelay" type="text" required class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">ROI Moyen</label>
                        <input name="roi" id="formRoi" type="text" required class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Image du Service</label>
                        <div class="relative group">
                            <input type="file" id="formImageFile" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="w-full p-4 border-2 border-dashed border-gray-200 rounded-lg flex flex-col items-center justify-center bg-gray-50 group-hover:bg-blue-50 group-hover:border-blue-200 transition-all">
                                <i data-lucide="image" class="w-6 h-6 text-gray-300 group-hover:text-blue-500 mb-1"></i>
                                <p class="text-[10px] text-gray-500" id="imageFileName">Choisir une image</p>
                            </div>
                        </div>
                        <input type="hidden" id="formImage" name="image">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Icône (Clé)</label>
                        <select name="icon" id="formIcon" class="w-full border rounded-lg p-2">
                            <option value="website">Website</option>
                            <option value="camera">Camera</option>
                            <option value="community">Community</option>
                            <option value="design">Design</option>
                            <option value="content">Content</option>
                        </select>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">
                            Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/admin.js"></script>
    <script>
        lucide.createIcons();
        let servicesCache = [];

        document.getElementById('formImageFile').addEventListener('change', e => {
            const name = e.target.files[0] ? e.target.files[0].name : 'Choisir une image';
            document.getElementById('imageFileName').textContent = name;
        });

        async function loadServices() {
            const services = await AdminApp.request('/services');
            if (services && !services.error) {
                servicesCache = services;
                const list = document.getElementById('servicesList');
                list.innerHTML = servicesCache.map(s => {
                    const imgUrl = s.image ? (s.image.startsWith('http') ? s.image : `${API_BASE.replace('/api','')}${s.image}`) : '../../assets/placeholder-service.jpg';
                    return `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden group">
                            <div class="h-32 bg-gray-100 relative overflow-hidden">
                                <img src="${imgUrl}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/10"></div>
                            </div>
                            <div class="p-6">
                                <div class="flex items-center justify-between mb-4">
                                    <h4 class="font-bold text-lg">${s.title}</h4>
                                    <div class="flex space-x-2">
                                        <button onclick="editService(${s.id})" class="text-blue-600 hover:text-blue-700 font-medium text-sm">Modifier</button>
                                        <button onclick="deleteService(${s.id})" class="text-red-600 hover:text-red-700 font-medium text-sm">Supprimer</button>
                                    </div>
                                </div>
                                <p class="text-sm text-gray-500 line-clamp-2">${s.description || ''}</p>
                            </div>
                        </div>
                    `;
                }).join('');
                lucide.createIcons();
            }
        }

        function openModal(isEdit = false) {
            const modal = document.getElementById('serviceModal');
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('submitBtn');
            const form = document.getElementById('serviceForm');

            if (!isEdit) {
                form.reset();
                document.getElementById('serviceIdField').value = "";
                document.getElementById('imageFileName').textContent = 'Choisir une image';
                title.textContent = "Ajouter un Service";
                submitBtn.textContent = "Créer le service";
            } else {
                title.textContent = "Modifier le Service";
                submitBtn.textContent = "Enregistrer les modifications";
            }
            modal.classList.remove('hidden');
        }

        function editService(id) {
            const s = servicesCache.find(x => x.id === id);
            if (!s) return;

            openModal(true);
            document.getElementById('serviceIdField').value = s.id;
            document.getElementById('formName').value = s.title;
            document.getElementById('formIcon').value = s.icon || 'website';
            document.getElementById('formImage').value = s.image || '';
            document.getElementById('imageFileName').textContent = s.image ? 'Image actuelle conservée' : 'Choisir une image';
        }

        async function deleteService(id) {
            if (!confirm('Supprimer ce service ?')) return;
            const res = await AdminApp.request(`/admin/services/${id}`, { method: 'DELETE' });
            if (res.success) loadServices();
        }

        function closeModal() {
            document.getElementById('serviceModal').classList.add('hidden');
        }

        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Traitement...';

            const id = document.getElementById('serviceIdField').value;
            const fileInput = document.getElementById('formImageFile');
            
            let imageUrl = document.getElementById('formImage').value;
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                const token = AdminApp.getToken();
                const uploadRes = await fetch(`${API_BASE}/admin/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const uploadData = await uploadRes.json();
                if (uploadData.success) imageUrl = uploadData.url;
            }

            const data = {
                title: document.getElementById('formName').value,
                description: 'Service premium par CVisual Agency', // Default for now
                icon: document.getElementById('formIcon').value,
                image: imageUrl
            };

            const url = id ? `/admin/services/${id}` : '/admin/services';
            const method = id ? 'PUT' : 'POST';

            const res = await AdminApp.request(url, {
                method: method,
                body: JSON.stringify(data)
            });

            if (res.success) {
                closeModal();
                loadServices();
            }
            btn.disabled = false;
            btn.textContent = 'Enregistrer';
        });

        loadServices();
    </script>
</body>
