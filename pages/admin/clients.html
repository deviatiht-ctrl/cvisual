<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients & Logos - CVisual Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/admin-responsive.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar { background: #0f172a; color: white; height: 100vh; position: fixed; width: 260px; transition: all 0.3s; }
        .nav-link { display: flex; items-center: center; padding: 0.75rem 1.5rem; color: #94a3b8; transition: all 0.2s; border-radius: 0.75rem; margin: 0.25rem 1rem; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.05); color: white; }
        .main-content { margin-left: 260px; padding: 2rem; min-height: 100vh; }
        .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="admin-layout">
    <script src="../../assets/js/admin-responsive.js"></script>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="p-8 mb-4">
            <div class="flex items-center space-x-3">
                <img src="../../assets/logo.jpg" class="w-10 h-10 rounded-xl" alt="Logo">
                <span class="text-xl font-bold font-outfit tracking-tighter">CVISUAL</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="../../index.html" class="nav-link text-blue-400 font-bold mb-4 border-b border-white/10 pb-4">
                <i data-lucide="external-link" class="w-5 h-5 mr-3"></i>
                Retour au Site
            </a>
            <a href="dashboard.html" class="nav-link">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                Dashboard
            </a>
            <a href="portfolio.html" class="nav-link">
                <i data-lucide="briefcase" class="w-5 h-5 mr-3"></i>
                Portfolio
            </a>
            <a href="services.html" class="nav-link">
                <i data-lucide="layers" class="w-5 h-5 mr-3"></i>
                Services
            </a>
            <a href="news.html" class="nav-link">
                <i data-lucide="newspaper" class="w-5 h-5 mr-3"></i>
                News & Jobs
            </a>
            <a href="recruitment_form.html" class="nav-link">
                <i data-lucide="file-text" class="w-5 h-5 mr-3"></i>
                Formulaire
            </a>
            <a href="applications.html" class="nav-link">
                <i data-lucide="users" class="w-5 h-5 mr-3"></i>
                Candidatures
            </a>
            <a href="clients.html" class="nav-link active">
                <i data-lucide="image" class="w-5 h-5 mr-3"></i>
                Clients/Logos
            </a>
            <a href="newsletter.html" class="nav-link">
                <i data-lucide="mail" class="w-5 h-5 mr-3"></i>
                Newsletter
            </a>
        </nav>
        <div class="absolute bottom-8 w-full px-4">
            <button onclick="AdminApp.logout()" class="flex items-center w-full p-4 text-red-400 hover:bg-red-500/10 rounded-2xl transition">
                <i data-lucide="log-out" class="w-5 h-5 mr-3"></i>Déconnexion
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Clients & Logos</h1>
                <p class="text-gray-500 mt-1">Gérez les logos des entreprises qui vous font confiance.</p>
            </div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-bold flex items-center shadow-lg shadow-blue-600/20 transition-all">
                <i data-lucide="plus" class="w-5 h-5 mr-2"></i>Nouveau Client
            </button>
        </div>

        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-6" id="clientsList">
            <!-- Loading state -->
            <div class="col-span-full py-20 text-center text-gray-400">
                <i data-lucide="loader-2" class="w-10 h-10 animate-spin mx-auto mb-4"></i>
                <p>Chargement des clients...</p>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="card w-full max-w-lg p-8">
            <h2 class="text-2xl font-bold mb-6">Ajouter un Client</h2>
            <form id="clientForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Nom de l'entreprise</label>
                    <input type="text" id="clientName" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Logo de l'entreprise</label>
                    <div class="relative group">
                        <input type="file" id="clientLogoFile" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="w-full p-6 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center bg-gray-50 group-hover:bg-blue-50 group-hover:border-blue-200 transition-all">
                            <i data-lucide="image" class="w-8 h-8 text-gray-300 group-hover:text-blue-500 mb-2"></i>
                            <p class="text-xs text-gray-500" id="logoFileName">Choisir un logo</p>
                        </div>
                    </div>
                </div>
                <div class="flex space-x-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-600 font-bold rounded-2xl hover:bg-gray-200 transition">Annuler</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 shadow-lg shadow-blue-600/20 transition">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../assets/js/admin.js"></script>
    <script>
        lucide.createIcons();

        document.getElementById('clientLogoFile').addEventListener('change', e => {
            const name = e.target.files[0] ? e.target.files[0].name : 'Choisir un logo';
            document.getElementById('logoFileName').textContent = name;
        });

        async function loadClients() {
            const list = document.getElementById('clientsList');
            const data = await AdminApp.request('/clients');
            
            if (data.error) {
                list.innerHTML = `<div class="col-span-full p-10 text-center text-red-500 font-bold bg-red-50 rounded-3xl border border-red-100">Erreur de chargement.</div>`;
                return;
            }

            if (data.length === 0) {
                list.innerHTML = `
                    <div class="col-span-full py-20 text-center border-2 border-dashed border-gray-200 rounded-[3rem]">
                        <p class="text-gray-400 font-medium">Aucun client trouvé. Commencez par en ajouter un !</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = data.map(c => {
                const logoUrl = c.logo.startsWith('http') ? c.logo : `${API_BASE.replace('/api','')}${c.logo}`;
                return `
                    <div class="card p-6 flex flex-col items-center group relative overflow-hidden">
                        <div class="w-full h-32 flex items-center justify-center mb-4 bg-gray-50 rounded-2xl p-6 transition-all group-hover:scale-105">
                            <img src="${logoUrl}" alt="${c.name}" class="max-w-full max-h-full object-contain grayscale opacity-60 group-hover:grayscale-0 group-hover:opacity-100 transition-all">
                        </div>
                        <h3 class="font-bold text-gray-800 text-center">${c.name}</h3>
                        <button onclick="deleteClient(${c.id})" class="absolute top-4 right-4 p-2 bg-red-50 text-red-500 rounded-xl opacity-0 group-hover:opacity-100 transition-all hover:bg-red-500 hover:text-white">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        document.getElementById('clientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Chargement...';

            const name = document.getElementById('clientName').value;
            const fileInput = document.getElementById('clientLogoFile');
            
            let logoUrl = '';
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                
                // Use a direct fetch for file upload as AdminApp.request might need adjustments for FormData
                const token = AdminApp.getToken();
                const uploadRes = await fetch(`${API_BASE}/admin/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const uploadData = await uploadRes.json();
                if (uploadData.success) {
                    logoUrl = uploadData.url;
                } else {
                    alert('Erreur lors de l\'upload du logo.');
                    btn.disabled = false;
                    btn.textContent = 'Enregistrer';
                    return;
                }
            }

            const res = await AdminApp.request('/admin/clients', {
                method: 'POST',
                body: JSON.stringify({ name, logo: logoUrl })
            });

            if (res.success) {
                closeModal();
                loadClients();
                e.target.reset();
                document.getElementById('logoFileName').textContent = 'Choisir un logo';
            } else {
                alert('Erreur lors de l\'ajout.');
            }
            btn.disabled = false;
            btn.textContent = 'Enregistrer';
        });

        async function deleteClient(id) {
            if (!confirm('Voulez-vous vraiment supprimer ce client ?')) return;
            const res = await AdminApp.request(`/admin/clients/${id}`, { method: 'DELETE' });
            if (res.success) loadClients();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        loadClients();
    </script>
</body>
</html>
