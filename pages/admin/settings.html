<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - CVisual Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="../../assets/admin-responsive.css">
</head>
<body class="admin-layout">
    <script src="../../assets/js/admin-responsive.js"></script>

    <aside class="sidebar">
        <div class="sidebar-logo" onclick="window.location.href='../index.html'">
            <img src="../../assets/logo.jpg" alt="Logo" class="w-10 h-10 rounded">
            <span>CVisual</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="settings.html" class="nav-item active">Paramètres</a>
            <a href="../../index.html" class="nav-item text-blue-400 mt-4 border-t border-white/10 pt-4">Retour au Site</a>
        </nav>
        <div class="mt-auto">
            <button onclick="AdminApp.logout()" class="nav-item w-full text-left text-red-400">Déconnexion</button>
        </div>
    </aside>

    <main class="main-content">
        <h1 class="text-3xl font-outfit font-black mb-8">Paramètres du Système</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Manage Admins -->
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-6 flex items-center"><i data-lucide="users" class="w-5 h-5 mr-2 text-primary"></i>Ajouter un Administrateur</h2>
                <form id="addAdminForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Nom d'utilisateur</label>
                        <input type="text" id="newAdminUser" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-primary/20" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Mot de passe</label>
                        <input type="password" id="newAdminPass" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-primary/20" required>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-primary-dark transition">Créer le compte</button>
                </form>
            </div>

            <!-- Site Settings -->
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-6 flex items-center"><i data-lucide="settings" class="w-5 h-5 mr-2 text-primary"></i>Informations du Site</h2>
                <div class="space-y-4 opacity-50 pointer-events-none">
                    <p class="text-sm text-gray-500 italic">D'autres paramètres seront disponibles bientôt (Email, API Keys, etc.)</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../../assets/js/admin.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('addAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('newAdminUser').value;
            const password = document.getElementById('newAdminPass').value;
            
            const res = await AdminApp.request('/admin/manage', 'POST', { username, password });
            if (res.success) {
                alert('Nouvel administrateur ajouté !');
                e.target.reset();
            } else {
                alert(res.msg || 'Erreur lors de la création');
            }
        });
    </script>
</body>
</html>
