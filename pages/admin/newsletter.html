<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter - CVisual Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/admin-responsive.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar { background: #0f172a; color: white; height: 100vh; position: fixed; width: 260px; z-index: 10; }
        .nav-link { display: flex; items-center: center; padding: 0.75rem 1.5rem; color: #94a3b8; transition: all 0.2s; border-radius: 0.75rem; margin: 0.25rem 1rem; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.05); color: white; }
        .main-content { margin-left: 260px; padding: 2rem; min-height: 100vh; }
        .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="admin-layout">
    <script src="../../assets/js/admin-responsive.js"></script>
    <aside class="sidebar">
        <div class="p-8 mb-4">
            <div class="flex items-center space-x-3">
                <img src="../../assets/logo.jpg" class="w-10 h-10 rounded-xl" alt="Logo">
                <span class="text-xl font-bold font-outfit tracking-tighter">CVISUAL</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="../../index.html" class="nav-link text-blue-400 font-bold mb-4 border-b border-white/10 pb-4">
                <i data-lucide="external-link" class="w-5 h-5 mr-3"></i>
                Retour au Site
            </a>
            <a href="dashboard.html" class="nav-link">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                Dashboard
            </a>
            <a href="portfolio.html" class="nav-link">
                <i data-lucide="briefcase" class="w-5 h-5 mr-3"></i>
                Portfolio
            </a>
            <a href="services.html" class="nav-link">
                <i data-lucide="layers" class="w-5 h-5 mr-3"></i>
                Services
            </a>
            <a href="news.html" class="nav-link">
                <i data-lucide="newspaper" class="w-5 h-5 mr-3"></i>
                News & Jobs
            </a>
            <a href="recruitment_form.html" class="nav-link">
                <i data-lucide="file-text" class="w-5 h-5 mr-3"></i>
                Formulaire
            </a>
            <a href="applications.html" class="nav-link">
                <i data-lucide="users" class="w-5 h-5 mr-3"></i>
                Candidatures
            </a>
            <a href="clients.html" class="nav-link">
                <i data-lucide="image" class="w-5 h-5 mr-3"></i>
                Clients/Logos
            </a>
            <a href="newsletter.html" class="nav-link active">
                <i data-lucide="mail" class="w-5 h-5 mr-3"></i>
                Newsletter
            </a>
        </nav>
        <div class="absolute bottom-8 w-full px-4">
            <button onclick="AdminApp.logout()" class="flex items-center w-full p-4 text-red-400 hover:bg-red-500/10 rounded-2xl transition">
                <i data-lucide="log-out" class="w-5 h-5 mr-3"></i>Déconnexion
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Newsletter Subscribers</h1>
                <p class="text-gray-500 mt-1">Gérez la liste de diffusion de votre agence.</p>
            </div>
            <button onclick="exportCSV()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-bold flex items-center shadow-lg shadow-blue-600/20 transition-all">
                <i data-lucide="download" class="w-5 h-5 mr-2"></i>Exporter CSV
            </button>
        </div>

        <div class="card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Email</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Date d'inscription</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Status</th>
                    </tr>
                </thead>
                <tbody id="subsList">
                    <!-- Subs loaded here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="../../assets/js/admin.js"></script>
    <script>
        lucide.createIcons();

        async function loadSubs() {
            const list = document.getElementById('subsList');
            const data = await AdminApp.request('/admin/newsletter');
            
            if (data.error) {
                list.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-500 font-bold">Erreur de chargement des abonnés.</td></tr>`;
                return;
            }

            if (data.length === 0) {
                list.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-gray-400">Aucun abonné pour le moment.</td></tr>`;
                return;
            }

            list.innerHTML = data.map(s => `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                    <td class="p-6 font-bold text-gray-800">${s.email}</td>
                    <td class="p-6 text-gray-500 text-sm">${s.date}</td>
                    <td class="p-6">
                        <span class="px-3 py-1 bg-emerald-100 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-tighter">Actif</span>
                    </td>
                </tr>
            `).join('');
        }

        function exportCSV() {
            const rows = document.querySelectorAll('#subsList tr');
            let csvContent = "data:text/csv;charset=utf-8,Email,Date\n";
            rows.forEach(row => {
                const cols = row.querySelectorAll('td');
                if (cols.length >= 2) {
                    csvContent += `${cols[0].innerText},${cols[1].innerText}\n`;
                }
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "newsletter_subscribers.csv");
            document.body.appendChild(link);
            link.click();
        }

        loadSubs();
    </script>
</body>
</html>
