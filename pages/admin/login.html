<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | CVisual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
            margin: 0;
            overflow: hidden;
        }
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(59, 130, 246, 0) 70%);
            filter: blur(80px);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-premium {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="bg-glow top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
    
    <div class="w-full max-w-md px-6">
        <div class="glass-card rounded-[2.5rem] p-10 md:p-12 relative overflow-hidden">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center space-x-3 mb-6">
                    <img src="../../assets/logo.jpg" class="w-12 h-12 rounded-2xl border border-white/10" alt="Logo">
                    <div class="text-left">
                        <h1 class="text-2xl font-outfit font-black tracking-tighter">CVISUAL</h1>
                        <p class="text-[8px] uppercase tracking-[0.3em] text-blue-500 font-bold">Admin Portal</p>
                    </div>
                </div>
                <h2 class="text-xl font-bold text-gray-200">Content Management</h2>
                <p class="text-gray-500 text-sm mt-1">Veuillez vous identifier pour continuer.</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="flex items-center space-x-2 text-[10px] font-black uppercase tracking-widest text-gray-500 ml-2">
                        <i data-lucide="user" class="w-3 h-3"></i>
                        <span>Username</span>
                    </label>
                    <input type="text" id="username" class="w-full p-4 rounded-2xl input-premium" placeholder="admin" required>
                </div>

                <div class="space-y-2">
                    <label class="flex items-center space-x-2 text-[10px] font-black uppercase tracking-widest text-gray-500 ml-2">
                        <i data-lucide="lock" class="w-3 h-3"></i>
                        <span>Password</span>
                    </label>
                    <input type="password" id="password" class="w-full p-4 rounded-2xl input-premium" placeholder="••••••••" required>
                </div>

                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl transition-all shadow-lg shadow-blue-500/20 active:scale-95 flex items-center justify-center space-x-2">
                    <span>Connexion</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <div id="errorMessage" class="hidden mt-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center font-bold"></div>
        </div>

        <p class="text-center text-gray-600 text-xs mt-8">
            © 2025 CVisual Agency. Security Restricted Area.
        </p>
    </div>

    <script src="../../assets/js/admin.js"></script>
    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>Verification...</span>`;
            lucide.createIcons();

            try {
                const response = await fetch('https://cvisual-backend.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    AdminApp.setToken(data.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    errorEl.textContent = data.msg || 'Identifiants invalides';
                    errorEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    lucide.createIcons();
                }
            } catch (err) {
                errorEl.textContent = 'Erreur: Serveur hors ligne';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
