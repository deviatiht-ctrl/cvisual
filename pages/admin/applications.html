<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatures - CVisual Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/admin-responsive.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar { background: #0f172a; color: white; height: 100vh; position: fixed; width: 260px; z-index: 10; }
        .nav-link { display: flex; items-center: center; padding: 0.75rem 1.5rem; color: #94a3b8; transition: all 0.2s; border-radius: 0.75rem; margin: 0.25rem 1rem; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.05); color: white; }
        .main-content { margin-left: 260px; padding: 2rem; min-height: 100vh; }
        .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
        .status-pill { padding: 0.25rem 0.75rem; rounded-full: 9999px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-interview { background: #dbeafe; color: #1e40af; }
        .status-accepted { background: #dcfce7; color: #166534; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="admin-layout">
    <script src="../../assets/js/admin-responsive.js"></script>
    <aside class="sidebar">
        <div class="p-8 mb-4">
            <div class="flex items-center space-x-3">
                <img src="../../assets/logo.jpg" class="w-10 h-10 rounded-xl" alt="Logo">
                <span class="text-xl font-bold font-outfit tracking-tighter">CVISUAL</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="../../index.html" class="nav-link text-blue-400 font-bold mb-4 border-b border-white/10 pb-4">
                <i data-lucide="external-link" class="w-5 h-5 mr-3"></i>
                Retour au Site
            </a>
            <a href="dashboard.html" class="nav-link">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                Dashboard
            </a>
            <a href="portfolio.html" class="nav-link">
                <i data-lucide="briefcase" class="w-5 h-5 mr-3"></i>
                Portfolio
            </a>
            <a href="services.html" class="nav-link">
                <i data-lucide="layers" class="w-5 h-5 mr-3"></i>
                Services
            </a>
            <a href="news.html" class="nav-link">
                <i data-lucide="newspaper" class="w-5 h-5 mr-3"></i>
                News & Jobs
            </a>
            <a href="recruitment_form.html" class="nav-link">
                <i data-lucide="settings-2" class="w-5 h-5 mr-3"></i>
                Config Recrutement
            </a>
            <a href="applications.html" class="nav-link active">
                <i data-lucide="users" class="w-5 h-5 mr-3"></i>
                Candidatures
            </a>
            <a href="clients.html" class="nav-link">
                <i data-lucide="image" class="w-5 h-5 mr-3"></i>
                Clients/Logos
            </a>
            <a href="newsletter.html" class="nav-link">
                <i data-lucide="mail" class="w-5 h-5 mr-3"></i>
                Newsletter
            </a>
            <a href="chat.html" class="nav-link">
                <i data-lucide="message-square" class="w-5 h-5 mr-3"></i>
                Chat Support
            </a>
            <a href="settings.html" class="nav-link">
                <i data-lucide="settings" class="w-5 h-5 mr-3"></i>
                Paramètres
            </a>
        </nav>
        <div class="absolute bottom-8 w-full px-4">
            <button onclick="AdminApp.logout()" class="flex items-center w-full p-4 text-red-400 hover:bg-red-500/10 rounded-2xl transition">
                <i data-lucide="log-out" class="w-5 h-5 mr-3"></i>Déconnexion
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Candidatures Reçues</h1>
                <p class="text-gray-500 mt-1">Gérez les profils qui souhaitent rejoindre l'aventure CVisual.</p>
            </div>
        </div>

        <div class="card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Candidat</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Contact</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Date</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Status</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Actions</th>
                    </tr>
                </thead>
                <tbody id="appsList">
                    <!-- Apps loaded here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Details Modal -->
    <div id="detailsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="card w-full max-w-2xl p-10 max-h-[90vh] overflow-y-auto relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900"><i data-lucide="x" class="w-6 h-6"></i></button>
            <div id="detailsContent">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>

    <script src="../../assets/js/admin.js"></script>
    <script>
        lucide.createIcons();

        async function loadApps() {
            const list = document.getElementById('appsList');
            const data = await AdminApp.request('/admin/applications');
            
            if (data.length === 0) {
                list.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400">Aucune candidature pour le moment.</td></tr>`;
                return;
            }

            list.innerHTML = data.map(a => `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                    <td class="p-6">
                        <div class="font-bold text-gray-900">${a.full_name}</div>
                        <div class="text-xs text-gray-400">${a.email}</div>
                    </td>
                    <td class="p-6 text-gray-500 text-sm">${a.date}</td>
                    <td class="p-6">
                        <span class="status-pill status-${a.status}">${a.status}</span>
                    </td>
                    <td class="p-6">
                        <button onclick="viewDetails(${a.id})" class="p-3 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        window.viewDetails = async function(id) {
            const a = await AdminApp.request(`/admin/applications/${id}`);
            const content = document.getElementById('detailsContent');
            const answers = JSON.parse(a.answers || '{}');
            
            content.innerHTML = `
                <div class="flex items-center space-x-4 mb-8">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl font-black">
                        ${a.full_name[0]}
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-gray-900">${a.full_name}</h2>
                        <p class="text-gray-500">${a.email} • ${a.whatsapp}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 mb-8">
                    <div class="p-4 bg-gray-50 rounded-2xl">
                        <p class="text-[10px] font-black uppercase text-gray-400 mb-1">TikTok</p>
                        <p class="font-bold text-gray-800">${a.tiktok || 'N/A'}</p>
                    </div>
                    <div class="p-4 bg-gray-50 rounded-2xl">
                        <p class="text-[10px] font-black uppercase text-gray-400 mb-1">Date</p>
                        <p class="font-bold text-gray-800">${a.date}</p>
                    </div>
                </div>

                <div class="mb-8">
                    <p class="text-[10px] font-black uppercase text-gray-400 mb-2 px-2">Motivation</p>
                    <div class="bg-gray-50 p-6 rounded-3xl text-gray-700 leading-relaxed text-sm italic">
                        "${a.motivation || 'Pas de lettre de motivation.'}"
                    </div>
                </div>

                <div class="mb-8">
                    <p class="text-[10px] font-black uppercase text-gray-400 mb-4 px-2">Réponses aux Questions</p>
                    <div class="space-y-4">
                        ${Object.keys(answers).length > 0 ? Object.entries(answers).map(([q, ans]) => `
                            <div class="p-4 bg-white border border-gray-100 rounded-2xl">
                                <p class="text-[8px] text-gray-400 font-bold mb-1 uppercase tracking-widest">Question ID: ${q}</p>
                                <p class="font-medium text-gray-800">${ans}</p>
                            </div>
                        `).join('') : '<p class="text-gray-400 italic text-center py-4 text-xs">Aucune question personnalisée.</p>'}
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 pt-6 border-t border-gray-100">
                    ${a.cv_link ? `
                        <a href="${a.cv_link}" target="_blank" class="flex-1 p-4 bg-gray-900 text-white rounded-2xl font-bold flex items-center justify-center space-x-2">
                            <i data-lucide="link" class="w-5 h-5"></i><span>Lien Portfolio</span>
                        </a>
                    ` : ''}
                    ${a.cv_filename ? `
                        <a href="https://cvisual-backend.onrender.com/api/uploads/${a.cv_filename}" target="_blank" class="flex-1 p-4 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-2xl font-bold flex items-center justify-center space-x-2">
                            <i data-lucide="download" class="w-5 h-5"></i><span>Télécharger CV</span>
                        </a>
                    ` : ''}
                </div>

                <div class="mt-8 pt-6 border-t border-gray-100">
                    <p class="text-[10px] font-black uppercase text-gray-400 mb-4">Mettre à jour le statut</p>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="updateStatus(${a.id}, 'pending')" class="p-3 rounded-xl border border-gray-200 text-[10px] font-bold hover:bg-amber-50 transition ${a.status==='pending'?'bg-amber-50 border-amber-200':''}">Attente</button>
                        <button onclick="updateStatus(${a.id}, 'interview')" class="p-3 rounded-xl border border-gray-200 text-[10px] font-bold hover:bg-blue-50 transition ${a.status==='interview'?'bg-blue-50 border-blue-200':''}">Entretien</button>
                        <button onclick="updateStatus(${a.id}, 'accepted')" class="p-3 rounded-xl border border-gray-200 text-[10px] font-bold hover:bg-emerald-50 transition ${a.status==='accepted'?'bg-emerald-50 border-emerald-200':''}">Accepté</button>
                        <button onclick="updateStatus(${a.id}, 'rejected')" class="p-3 rounded-xl border border-gray-200 text-[10px] font-bold hover:bg-red-50 transition text-red-600 ${a.status==='rejected'?'bg-red-50 border-red-200':''}">Refusé</button>
                    </div>
                </div>
            `;
            document.getElementById('detailsModal').classList.remove('hidden');
            lucide.createIcons();
        }

        window.updateStatus = async function(id, status) {
            await AdminApp.request(`/admin/applications/${id}/status`, 'PUT', { status });
            closeModal();
            loadApps();
        }

        window.closeModal = function() { document.getElementById('detailsModal').classList.add('hidden'); }

        loadApps();
    </script>
</body>
</html>
