<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Client - CVisual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] p-10 md:p-12 shadow-2xl shadow-blue-500/10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center space-x-3 mb-6">
                <img src="../../assets/logo.jpg" class="w-12 h-12 rounded-2xl" alt="Logo">
                <span class="text-3xl font-outfit font-black tracking-tighter text-gray-900">CVISUAL</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Bon retour !</h1>
            <p class="text-gray-500 mt-2">Connectez-vous pour gérer vos demandes.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                <input type="email" id="email" class="w-full p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="jean@example.com" required>
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-bold text-gray-700">Mot de passe</label>
                    <a href="#" class="text-xs font-bold text-blue-600 hover:underline">Oublié ?</a>
                </div>
                <input type="password" id="password" class="w-full p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="••••••••" required>
            </div>

            <button type="submit" class="w-full py-5 bg-gray-900 text-white font-bold rounded-[1.5rem] hover:bg-blue-600 shadow-lg shadow-blue-600/20 transition-all transform hover:-translate-y-1">
                Se connecter
            </button>
        </form>

        <div class="text-center mt-8 text-gray-500 text-sm">
            Nouveau chez CVisual ? <a href="register.html" class="text-blue-600 font-bold hover:underline">Créer un compte</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const API_BASE = 'https://cvisual-backend.onrender.com/api';
            try {
                const res = await fetch(`${API_BASE}/user/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.access_token) {
                    localStorage.setItem('userToken', result.access_token);
                    localStorage.setItem('userData', JSON.stringify(result.user));
                    window.location.href = '../../index.html';
                } else {
                    alert(result.msg || 'Identifiants invalides');
                }
            } catch (error) {
                alert('Erreur serveur. Veuillez réessayer.');
            }
        });
    </script>
</body>
</html>
