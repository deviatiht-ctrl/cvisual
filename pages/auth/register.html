<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Client - CVisual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-xl bg-white rounded-[2.5rem] p-10 md:p-12 shadow-2xl shadow-blue-500/10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center space-x-3 mb-6">
                <img src="../../assets/logo.jpg" class="w-12 h-12 rounded-2xl" alt="Logo">
                <span class="text-3xl font-outfit font-black tracking-tighter text-gray-900">CVISUAL</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Créer votre compte</h1>
            <p class="text-gray-500 mt-2">Pour demander un devis ou un service personnalisé.</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nom Complet</label>
                    <input type="text" id="fullName" class="w-full p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="Jean Dupont" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" class="w-full p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="jean@example.com" required>
                </div>
            </div>

            <div class="flex items-center space-x-4 p-4 bg-blue-50 rounded-2xl mb-4">
                <input type="checkbox" id="isCompany" class="w-5 h-5 rounded-lg text-blue-600 focus:ring-blue-500">
                <label for="isCompany" class="text-sm font-bold text-blue-900">Je représente une entreprise</label>
            </div>

            <div id="companyField" class="hidden">
                <label class="block text-sm font-bold text-gray-700 mb-2">Nom de l'entreprise</label>
                <input type="text" id="companyName" class="w-full p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="Nom de votre société">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Mot de passe</label>
                <input type="password" id="password" class="w-full p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="••••••••" required>
            </div>

            <button type="submit" class="w-full py-5 bg-gray-900 text-white font-bold rounded-[1.5rem] hover:bg-blue-600 shadow-lg shadow-blue-600/20 transition-all transform hover:-translate-y-1">
                S'inscrire
            </button>
        </form>

        <div class="text-center mt-8 text-gray-500 text-sm">
            Vous avez déjà un compte ? <a href="login.html" class="text-blue-600 font-bold hover:underline">Se connecter</a>
        </div>
    </div>

    <script>
        document.getElementById('isCompany').addEventListener('change', (e) => {
            document.getElementById('companyField').classList.toggle('hidden', !e.target.checked);
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                isCompany: document.getElementById('isCompany').checked,
                companyName: document.getElementById('companyName').value
            };

            const API_BASE = 'https://cvisual-backend.onrender.com/api';
            try {
                const res = await fetch(`${API_BASE}/user/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert('Compte créé avec succès ! Veuillez vous connecter.');
                    window.location.href = 'login.html';
                } else {
                    alert(result.msg || 'Erreur lors de l\'inscription');
                }
            } catch (error) {
                alert('Erreur serveur. Veuillez réessayer.');
            }
        });
    </script>
</body>
</html>
