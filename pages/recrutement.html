<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recrutement - CVisual Agency</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', accent: '#F97316', dark: '#0a0a0a' },
                    fontFamily: { outfit: ['Outfit', 'sans-serif'], inter: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
        .input-glass { background: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.3s ease; color: #1a1a1a; }
        .input-glass:focus { background: #ffffff; border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); outline: none; }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); transform: translateY(-2px); }
        .bg-dots { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="bg-dots min-h-screen p-4 md:p-12">

    <div class="max-w-3xl mx-auto">
        <!-- Back Button -->
        <a href="../index.html" class="inline-flex items-center space-x-2 text-gray-400 hover:text-primary transition-all mb-8 group">
            <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
            <span class="text-xs font-black uppercase tracking-widest">Retour à l'accueil</span>
        </a>

        <!-- Logo/Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center space-x-3 mb-6">
                <img src="../assets/logo.jpg" class="w-14 h-14 rounded-2xl border border-gray-100" alt="Logo">
                <div class="text-left">
                    <h1 class="text-3xl font-outfit font-black tracking-tighter">CVISUAL</h1>
                    <p class="text-[10px] uppercase tracking-[0.3em] text-primary font-bold">Creative Digital Agency</p>
                </div>
            </div>
            <h2 id="displayJobTitle" class="text-4xl font-outfit font-black text-gray-900 mb-4 tracking-tight">Rejoignez l'élite.</h2>
            <p id="displayJobDetails" class="text-gray-500 text-lg max-w-xl mx-auto">Nous bâtissons le futur digital avec les meilleurs talents.</p>
        </div>

        <div class="glass rounded-[3rem] p-8 md:p-16 relative overflow-hidden shadow-2xl">
            <div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 blur-[100px] -mr-32 -mt-32"></div>
            
            <form id="recruitmentForm" class="space-y-10 relative z-10">
                <!-- Section: Infos de base -->
                <div class="space-y-8">
                    <div class="flex items-center space-x-4 border-b border-gray-100 pb-4">
                        <span class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold text-sm">01</span>
                        <h3 class="font-outfit font-bold text-xl">Informations Personnelles</h3>
                    </div>

                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">Nom Complet</label>
                            <input type="text" id="fullName" required class="w-full p-5 rounded-3xl input-glass" placeholder="Jean Dupont">
                        </div>
                        <div class="space-y-3">
                            <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">Email</label>
                            <input type="email" id="email" required class="w-full p-5 rounded-3xl input-glass" placeholder="jean@email.com">
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">WhatsApp</label>
                            <input type="tel" id="whatsapp" required class="w-full p-5 rounded-3xl input-glass" placeholder="+509 ...">
                        </div>
                        <div class="space-y-3">
                            <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">TikTok Handle</label>
                            <input type="text" id="tiktok" required class="w-full p-5 rounded-3xl input-glass" placeholder="@username">
                        </div>
                    </div>
                </div>

                <!-- Section: Custom Questions -->
                <div class="space-y-8" id="customQuestionsContainer">
                    <div class="flex items-center space-x-4 border-b border-gray-100 pb-4">
                        <span class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold text-sm">02</span>
                        <h3 class="font-outfit font-bold text-xl">Votre Profil</h3>
                    </div>
                    <div id="dynamicQuestions" class="space-y-8">
                        <!-- Loaded from API -->
                    </div>
                </div>

                <!-- Section: Documents -->
                <div class="space-y-8">
                    <div class="flex items-center space-x-4 border-b border-gray-100 pb-4">
                        <span class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold text-sm">03</span>
                        <h3 class="font-outfit font-bold text-xl">Documents & Motivation</h3>
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">Upload CV (PDF, DOCX)</label>
                        <div class="relative group">
                            <input type="file" id="cvFile" accept=".pdf,.doc,.docx" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="w-full p-8 border-2 border-dashed border-gray-200 rounded-[2rem] flex flex-col items-center justify-center bg-gray-50 group-hover:bg-blue-50 group-hover:border-blue-200 transition-all">
                                <i data-lucide="upload-cloud" class="w-10 h-10 text-gray-300 group-hover:text-blue-500 mb-2"></i>
                                <p class="text-sm text-gray-500" id="fileName">Cliquez ou glissez votre CV ici</p>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">Lien Portfolio (Optionnel)</label>
                        <input type="url" id="cvLink" class="w-full p-5 rounded-3xl input-glass" placeholder="https://behance.net/...">
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">Pourquoi vous ?</label>
                        <textarea id="motivation" rows="5" required class="w-full p-5 rounded-3xl input-glass" placeholder="Parlez-nous de vos ambitions..."></textarea>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-6 bg-primary text-white font-black rounded-[2rem] btn-glow transition-all flex items-center justify-center space-x-3 shadow-xl shadow-primary/20 text-lg">
                    <span>Envoyer ma candidature</span>
                    <i data-lucide="send" class="w-6 h-6"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="../assets/js/public.js"></script>
    <script>
        lucide.createIcons();

        // Update file name on select
        document.getElementById('cvFile').addEventListener('change', e => {
            const name = e.target.files[0] ? e.target.files[0].name : 'Cliquez ou glissez votre CV ici';
            document.getElementById('fileName').textContent = name;
        });

        // Load Dynamic Questions & Job Info
        async function loadData() {
            try {
                // Fetch Job Info
                const infoRes = await fetch(`${API_BASE}/recruitment/info`);
                const info = await infoRes.json();
                if (info) {
                    if (info.is_active === false) {
                        document.querySelector('.glass').innerHTML = `
                            <div class="py-20 text-center">
                                <div class="w-20 h-20 bg-amber-100 text-amber-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                    <i data-lucide="lock" class="w-10 h-10"></i>
                                </div>
                                <h3 class="text-2xl font-black mb-2">Recrutement Fermé</h3>
                                <p class="text-gray-500">Nous ne prenons plus de candidatures pour le moment. Suivez-nous sur nos réseaux pour les prochaines opportunités.</p>
                                <a href="../index.html" class="inline-flex items-center space-x-2 text-primary font-bold mt-8 hover:underline">
                                    <i data-lucide="arrow-left" class="w-4 h-4"></i><span>Retour à l'accueil</span>
                                </a>
                            </div>
                        `;
                        lucide.createIcons();
                        return;
                    }
                    document.getElementById('displayJobTitle').textContent = info.job_title || "Rejoignez l'élite.";
                    document.getElementById('displayJobDetails').innerHTML = (info.job_details || 'Nous bâtissons le futur digital with les meilleurs talents.').replace(/\n/g, '<br>');
                }

                // Fetch Questions
                const res = await fetch(`${API_BASE}/recruitment/questions`);
                const questions = await res.json();
                const container = document.getElementById('dynamicQuestions');
                
                if (questions.length === 0) {
                    container.innerHTML = `<p class="text-gray-400 italic text-center py-4">Aucune question supplémentaire.</p>`;
                    return;
                }

                container.innerHTML = questions.map(q => {
                    let input = '';
                    if (q.type === 'text') {
                        input = `<input type="text" name="q-${q.id}" ${q.required ? 'required' : ''} class="w-full p-5 rounded-3xl input-glass" placeholder="Votre réponse...">`;
                    } else if (q.type === 'textarea') {
                        input = `<textarea name="q-${q.id}" ${q.required ? 'required' : ''} rows="3" class="w-full p-5 rounded-3xl input-glass" placeholder="Votre réponse..."></textarea>`;
                    } else if (q.type === 'select') {
                        const opts = q.options ? q.options.split(',').map(o => `<option value="${o.trim()}">${o.trim()}</option>`).join('') : '';
                        input = `<select name="q-${q.id}" ${q.required ? 'required' : ''} class="w-full p-5 rounded-3xl input-glass appearance-none"><option value="">Choisir une option...</option>${opts}</select>`;
                    } else if (q.type === 'checkbox') {
                        const opts = q.options ? q.options.split(',').map(o => `
                            <label class="flex items-center space-x-3 p-3 rounded-2xl bg-gray-50 hover:bg-blue-50 transition-all cursor-pointer">
                                <input type="checkbox" name="q-${q.id}" value="${o.trim()}" class="w-5 h-5 rounded-md border-gray-300 text-primary focus:ring-primary">
                                <span class="text-sm">${o.trim()}</span>
                            </label>
                        `).join('') : '';
                        input = `<div class="space-y-2">${opts}</div>`;
                    } else {
                        input = `<input type="${q.type}" name="q-${q.id}" ${q.required ? 'required' : ''} class="w-full p-5 rounded-3xl input-glass" placeholder="Votre réponse...">`;
                    }
                    
                    return `
                        <div class="space-y-3">
                            <label class="text-xs font-black uppercase tracking-widest text-gray-400 ml-1">${q.question} ${q.required ? '<span class="text-red-500">*</span>' : ''}</label>
                            ${input}
                        </div>
                    `;
                }).join('');
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        document.getElementById('recruitmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const original = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i><span>Traitement...</span>`;
            lucide.createIcons();

            // 1. Upload File if exists
            let cvFilename = null;
            const fileInput = document.getElementById('cvFile');
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                try {
                    const uploadRes = await fetch(`${API_BASE}/apply/upload`, { method: 'POST', body: formData });
                    const uploadData = await uploadRes.json();
                    if (uploadData.success) cvFilename = uploadData.filename;
                } catch (e) { console.error("Upload error", e); }
            }

            // 2. Gather Data
            const customAnswers = {};
            document.querySelectorAll('#dynamicQuestions [name^="q-"]').forEach(input => {
                const qId = input.name.replace('q-', '');
                if (input.type === 'checkbox') {
                    if (input.checked) {
                        if (!customAnswers[qId]) customAnswers[qId] = [];
                        customAnswers[qId].push(input.value);
                    }
                } else {
                    customAnswers[qId] = input.value;
                }
            });

            const payload = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('whatsapp').value,
                tiktok: document.getElementById('tiktok').value,
                cvLink: document.getElementById('cvLink').value,
                cvFilename: cvFilename,
                motivation: document.getElementById('motivation').value,
                answers: JSON.stringify(customAnswers)
            };

            // 3. Submit
            try {
                const res = await fetch(`${API_BASE}/apply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    btn.innerHTML = `<i data-lucide="check" class="w-6 h-6"></i><span>Candidature Envoyée !</span>`;
                    btn.className = btn.className.replace('bg-primary', 'bg-emerald-600');
                    setTimeout(() => window.location.href = '../index.html', 2000);
                } else { throw new Error(); }
            } catch (e) {
                btn.disabled = false;
                btn.innerHTML = original;
                alert("Une erreur est survenue.");
                lucide.createIcons();
            }
        });

        loadData();
    </script>
</body>
</html>
